services:
  - type: web
    name: roadsafety-dar
    runtime: python
    region: frankfurt
    plan: free
    branch: main
    pythonVersion: "3.11.9"
    buildCommand: "./build.sh"
    startCommand: "gunicorn roadsafety.wsgi:application --workers 2 --threads 2 --worker-class gthread --timeout 120 --bind 0.0.0.0:$PORT --log-level info --access-logfile - --error-logfile -"
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DJANGO_ENV
        value: prod
      - key: DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
