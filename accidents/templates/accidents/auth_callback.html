<!-- accidents/templates/accidents/auth_callback.html -->
<!-- 
  This page is shown for ~1 second after Google OAuth completes.
  JavaScript extracts the JWT from the URL fragment and POSTs it
  to /auth/callback/process/ to create the Django session.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing in... — Road Safety Dar</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f8f9fa;
    }
    .callback-card {
      text-align: center;
      background: white;
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      max-width: 360px;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #eee;
      border-top-color: #c0392b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { color: #2c3e50; margin: 0 0 0.5rem; }
    p { color: #666; margin: 0; }
    .error-msg { color: #c0392b; display: none; }
  </style>
</head>
<body>
  <div class="callback-card">
    <div class="spinner" id="spinner"></div>
    <h2>🚦 Signing you in...</h2>
    <p>Setting up your Road Safety Dar account</p>
    <p class="error-msg" id="error-msg"></p>
  </div>

  <script>
    (function() {
      // Extract tokens from URL fragment (#access_token=...&refresh_token=...)
      const fragment = window.location.hash.substring(1);
      const params = new URLSearchParams(fragment);
      const accessToken = params.get('access_token');
      const next = "{{ next|escapejs }}";

      if (!accessToken) {
        showError('No authentication token received. Please try again.');
        return;
      }

      // Get CSRF token from cookie
      function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return '';
      }

      // POST the token to Django to create the session
      fetch('{{ process_url }}', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': getCookie('csrftoken'),
        },
        body: JSON.stringify({
          access_token: accessToken,
          next: next,
        }),
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          // Session created — redirect to dashboard or original destination
          window.location.href = data.redirect || '/dashboard/';
        } else {
          showError(data.error || 'Sign-in failed. Please try again.');
        }
      })
      .catch(err => {
        showError('Network error. Please check your connection and try again.');
        console.error('Auth callback error:', err);
      });

      function showError(msg) {
        document.getElementById('spinner').style.display = 'none';
        const errEl = document.getElementById('error-msg');
        errEl.style.display = 'block';
        errEl.textContent = msg;
        // Auto-redirect to login after 3 seconds
        setTimeout(() => { window.location.href = '/auth/login/'; }, 3000);
      }
    })();
  </script>
</body>
</html>
